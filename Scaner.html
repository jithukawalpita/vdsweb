* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #050203; font-family: 'Lato', sans-serif; color: #f5deb3; }

/* ─────────── PASSWORD GATE ─────────── */
.gate {
  position: fixed; inset: 0; z-index: 100;
  background:
    radial-gradient(circle at 30% 20%, rgba(80,6,6,0.5), transparent 50%),
    radial-gradient(circle at 70% 80%, rgba(120,90,10,0.3), transparent 50%),
    linear-gradient(160deg, #0a0405 0%, #1a0a0a 60%, #0d0d0a 100%);
  display: flex; align-items: center; justify-content: center;
  padding: 2rem;
}
.gate-card {
  background: linear-gradient(160deg, rgba(18,8,8,0.95), rgba(28,12,12,0.92));
  border: 1px solid rgba(201,168,76,0.3);
  border-radius: 12px;
  padding: 2.6rem 2.2rem;
  max-width: 420px; width: 100%;
  text-align: center;
  box-shadow: 0 0 80px rgba(0,0,0,0.8);
}
.gate-wheel { font-size: 2.4rem; color: #c9a84c; margin-bottom: 0.8rem;
  filter: drop-shadow(0 0 14px rgba(201,168,76,0.4));
  animation: gateSpin 18s linear infinite; display: inline-block; }
@keyframes gateSpin { to { transform: rotate(360deg); } }
.gate-title { font-family: 'Cormorant Garamond', serif; font-size: 1.6rem; color: #fff; margin-bottom: 0.5rem; }
.gate-sub { font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: 3px; color: #c9a84c; text-transform: uppercase; margin-bottom: 1.6rem; }
.gate-divider { display: flex; align-items: center; gap: 10px; margin-bottom: 1.6rem; color: rgba(201,168,76,0.4); font-size: 11px; }
.gate-divider::before,
.gate-divider::after { content: ''; flex: 1; height: 1px; background: rgba(201,168,76,0.18); }

.gate-input {
  width: 100%;
  background: rgba(0,0,0,0.3);
  border: 1px solid rgba(201,168,76,0.25);
  border-radius: 4px;
  padding: 12px 16px;
  color: #f5deb3;
  font-size: 1rem;
  outline: none;
  margin-bottom: 1rem;
  font-family: 'Lato', sans-serif;
  letter-spacing: 1px;
}
.gate-input:focus { border-color: #c9a84c; background: rgba(201,168,76,0.05); }
.gate-input::placeholder { color: rgba(245,222,179,0.25); }

.gate-btn {
  width: 100%;
  padding: 12px;
  background: linear-gradient(135deg, #c9a84c, #a07810);
  color: #1a0800;
  border: none; border-radius: 4px;
  font-weight: 700; font-size: 11px;
  letter-spacing: 2.5px; text-transform: uppercase;
  cursor: pointer;
  transition: all .2s;
}
.gate-btn:hover { background: linear-gradient(135deg, #e0b95c, #b88a20); box-shadow: 0 4px 18px rgba(201,168,76,0.3); }
.gate-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.gate-err { margin-top: 0.8rem; color: #e07070; font-size: 0.82rem; min-height: 1rem; }
.gate-hint { font-size: 0.72rem; color: rgba(245,222,179,0.35); margin-top: 1.4rem; line-height: 1.6; font-style: italic; }
.gate-back { display: inline-block; margin-top: 1rem; font-size: 0.74rem; color: rgba(201,168,76,0.5); text-decoration: none; letter-spacing: 1px; }
.gate-back:hover { color: #c9a84c; }


/* ─────────── SCANNER UI ─────────── */
.scanner { position: fixed; inset: 0; display: none; }
.scanner.on { display: block; }

.scanner-video-wrap {
  position: absolute; inset: 0;
  background: #000;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
}
#camVideo {
  width: 100%; height: 100%; object-fit: cover;
  transform: scaleX(-1); /* mirror selfie-style */
}
#camOverlay {
  position: absolute; inset: 0; width: 100%; height: 100%;
  pointer-events: none;
  transform: scaleX(-1);
}

/* Top bar */
.top-bar {
  position: absolute; top: 0; left: 0; right: 0;
  padding: 1rem 1.4rem;
  background: linear-gradient(180deg, rgba(0,0,0,0.85), transparent);
  display: flex; justify-content: space-between; align-items: center;
  z-index: 10;
  color: #c9a84c;
}
.top-title { font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; }
.top-title .small { display: block; font-family: 'Cinzel', serif; font-size: 8.5px; letter-spacing: 2.5px; color: rgba(201,168,76,0.6); text-transform: uppercase; margin-top: 2px; }
.top-actions { display: flex; gap: 8px; }
.icon-btn {
  width: 36px; height: 36px;
  background: rgba(0,0,0,0.5);
  border: 1px solid rgba(201,168,76,0.3);
  border-radius: 50%;
  color: #c9a84c;
  cursor: pointer; font-size: 14px;
  display: flex; align-items: center; justify-content: center;
  transition: all .2s;
}
.icon-btn:hover { background: rgba(201,168,76,0.2); border-color: #c9a84c; }

/* Status banner */
.status-bar {
  position: absolute; top: 70px; left: 50%; transform: translateX(-50%);
  background: rgba(0,0,0,0.7);
  border: 1px solid rgba(201,168,76,0.3);
  border-radius: 40px;
  padding: 8px 20px;
  color: #c9a84c; font-size: 0.78rem;
  letter-spacing: 1.5px; text-transform: uppercase;
  z-index: 10;
  white-space: nowrap;
}

/* Recognition toast */
.toast-stack { position: absolute; bottom: 28px; left: 50%; transform: translateX(-50%); z-index: 10; display: flex; flex-direction: column-reverse; gap: 8px; max-width: 92vw; }
.toast {
  background: linear-gradient(135deg, rgba(20,40,12,0.92), rgba(12,30,8,0.92));
  border: 1px solid rgba(120,200,80,0.5);
  border-radius: 8px;
  padding: 12px 18px;
  color: #d8f3c8;
  display: flex; align-items: center; gap: 12px;
  min-width: 260px;
  box-shadow: 0 6px 28px rgba(0,0,0,0.6);
  animation: toastIn .3s ease both;
}
@keyframes toastIn { from { opacity: 0; transform: translateY(10px); } }
.toast.warn { background: linear-gradient(135deg, rgba(50,30,8,0.92), rgba(40,22,8,0.92)); border-color: rgba(220,170,80,0.5); color: #f5deb3; }
.toast.err  { background: linear-gradient(135deg, rgba(50,12,12,0.92), rgba(40,8,8,0.92)); border-color: rgba(220,80,80,0.5); color: #f5cfcf; }
.toast-avatar {
  width: 44px; height: 44px; border-radius: 50%;
  background: rgba(201,168,76,0.2);
  border: 1px solid rgba(201,168,76,0.4);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; font-size: 1.2rem; color: #c9a84c;
  overflow: hidden;
}
.toast-avatar img { width: 100%; height: 100%; object-fit: cover; }
.toast-text { line-height: 1.35; }
.toast-text .nm { font-weight: 700; font-size: 0.96rem; }
.toast-text .sub { font-size: 0.74rem; opacity: 0.8; letter-spacing: 0.5px; margin-top: 1px; }

/* Stats footer */
.stats-row {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: linear-gradient(0deg, rgba(0,0,0,0.8), transparent);
  padding: 1.4rem 1.4rem 0.9rem;
  display: flex; justify-content: center; gap: 2.6rem;
  z-index: 5;
  pointer-events: none;
}
.stat { text-align: center; color: #c9a84c; }
.stat-num { font-family: 'Cormorant Garamond', serif; font-size: 1.6rem; font-weight: 700; }
.stat-label { font-family: 'Cinzel', serif; font-size: 8.5px; letter-spacing: 2px; color: rgba(201,168,76,0.6); text-transform: uppercase; margin-top: 2px; }

/* Loading overlay (initial) */
.loading-mask {
  position: absolute; inset: 0;
  background: rgba(0,0,0,0.7);
  display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 1rem;
  z-index: 20;
  color: #c9a84c;
}
.loading-mask.hidden { display: none; }
.spinner {
  width: 48px; height: 48px;
  border: 3px solid rgba(201,168,76,0.2);
  border-top-color: #c9a84c;
  border-radius: 50%;
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: 2.5px; text-transform: uppercase; }

/* ═══════════════ Date + Mode control strip ═══════════════ */
.control-strip {
  position: absolute; top: 64px; left: 0; right: 0;
  background: linear-gradient(180deg, rgba(0,0,0,0.85), rgba(0,0,0,0.6));
  padding: 0.7rem 1rem;
  display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; gap: 0.8rem;
  z-index: 4;
  border-top: 1px solid rgba(201,168,76,0.15);
}
.ctrl-row { display: flex; align-items: center; gap: 0.55rem; }
.ctrl-label { font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: 1.5px; color: rgba(201,168,76,0.85); text-transform: uppercase; }
.ctrl-select, .ctrl-input {
  background: rgba(0,0,0,0.5); color: #f5deb3;
  border: 1px solid rgba(201,168,76,0.35); border-radius: 4px;
  padding: 7px 10px; font-size: 0.82rem; font-family: inherit;
  min-width: 150px; max-width: 240px;
  outline: none;
}
.ctrl-select:focus, .ctrl-input:focus { border-color: #c9a84c; }
.ctrl-select option { background: #1a0606; color: #f5deb3; }

.mode-toggle { display: flex; gap: 4px; background: rgba(0,0,0,0.5); border: 1px solid rgba(201,168,76,0.25); border-radius: 5px; padding: 3px; }
.mode-btn {
  background: transparent; border: 0; color: rgba(245,222,179,0.55);
  font-family: 'Cinzel', serif; font-size: 0.7rem; letter-spacing: 1.2px;
  padding: 6px 12px; border-radius: 3px; cursor: pointer;
  transition: all 0.15s ease;
}
.mode-btn.active { background: linear-gradient(135deg, #c9a84c, #b89540); color: #1a0606; font-weight: 600; }
.mode-btn:hover:not(.active) { color: #f5deb3; background: rgba(201,168,76,0.1); }

/* ═══════════════ Manual mode panel ═══════════════ */
.manual-panel {
  position: absolute; top: 132px; bottom: 90px; left: 0; right: 0;
  background: rgba(8,3,3,0.96);
  padding: 1rem;
  overflow-y: auto;
  z-index: 3;
}
.manual-filter-row {
  display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap;
  margin-bottom: 1rem; padding-bottom: 0.8rem;
  border-bottom: 1px solid rgba(201,168,76,0.15);
}
.manual-filter-row label { font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: 1.5px; color: rgba(201,168,76,0.85); text-transform: uppercase; }
.manual-list { display: flex; flex-direction: column; gap: 8px; }
.manual-hint { color: rgba(245,222,179,0.5); text-align: center; padding: 1.5rem 0; font-style: italic; font-size: 0.85rem; }
.manual-row {
  background: rgba(20,8,8,0.7);
  border: 1px solid rgba(201,168,76,0.18);
  border-radius: 8px;
  padding: 10px 12px;
  display: flex; align-items: center; gap: 12px;
  transition: border-color 0.15s ease;
}
.manual-row:hover { border-color: rgba(201,168,76,0.4); }
.manual-photo {
  width: 44px; height: 44px; border-radius: 50%;
  background: rgba(201,168,76,0.18); color: #c9a84c;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; font-weight: 600;
  flex-shrink: 0; overflow: hidden;
}
.manual-photo img { width: 100%; height: 100%; object-fit: cover; }
.manual-info { flex: 1; min-width: 0; overflow: hidden; }
.manual-name { color: #f5deb3; font-size: 0.88rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.manual-sub { color: rgba(245,222,179,0.5); font-size: 0.72rem; margin-top: 2px; }
.manual-actions { display: flex; gap: 5px; flex-shrink: 0; }
.manual-mark-btn {
  background: transparent; color: rgba(245,222,179,0.65);
  border: 1px solid rgba(201,168,76,0.3);
  border-radius: 5px; padding: 7px 11px;
  font-size: 0.78rem; font-weight: 600; cursor: pointer;
  transition: all 0.12s ease;
}
.manual-mark-btn.present:hover, .manual-mark-btn.present.active { background: rgba(26,124,46,0.85); color: #fff; border-color: #1a7c2e; }
.manual-mark-btn.absent:hover, .manual-mark-btn.absent.active { background: rgba(201,60,60,0.85); color: #fff; border-color: #c93c3c; }

@media (max-width: 600px) {
  .stats-row { gap: 1.4rem; }
  .stat-num { font-size: 1.3rem; }
  .top-title { font-size: 0.95rem; }
  .status-bar { font-size: 0.7rem; padding: 6px 14px; }
}
</style>
</head>
<body>

<!-- ═══════════════ PASSWORD GATE ═══════════════ -->
<div class="gate" id="gate">
  <div class="gate-card">
    <div class="gate-wheel">☸</div>
    <div class="gate-title">Attendance Scanner</div>
    <div class="gate-sub">Teachers Only</div>
    <div class="gate-divider"><span>Enter Access Code</span></div>
    <input class="gate-input" id="gatePass" type="password" placeholder="Access code" autocomplete="off">
    <button class="gate-btn" id="gateBtn" onclick="checkGate()">Unlock Scanner</button>
    <div class="gate-err" id="gateErr"></div>
    <div class="gate-hint">
      You must be a logged-in teacher and enter the access code shared with staff.
    </div>
    <a href="index.html" class="gate-back">← Back to website</a>
  </div>
</div>


<!-- ═══════════════ SCANNER ═══════════════ -->
<div class="scanner" id="scanner">

  <div class="scanner-video-wrap" id="scanModeWrap">
    <video id="camVideo" autoplay playsinline muted></video>
    <canvas id="camOverlay"></canvas>
  </div>

  <div class="top-bar">
    <div class="top-title">
      Face Attendance
      <span class="small">☸ Sri Vipassi Dhamma School</span>
    </div>
    <div class="top-actions">
      <button class="icon-btn" title="Reload faces" onclick="reloadFaces()">⟳</button>
      <button class="icon-btn" title="Exit scanner" onclick="exitScanner()">✕</button>
    </div>
  </div>

  <!-- Date + Mode selector strip -->
  <div class="control-strip">
    <div class="ctrl-row">
      <label class="ctrl-label">📅 Date:</label>
      <select id="dateSelect" class="ctrl-select" onchange="onDateChange()"></select>
    </div>
    <div class="ctrl-row">
      <div class="mode-toggle">
        <button class="mode-btn active" id="modeScanBtn" onclick="setMode('scan')">📷 Scan</button>
        <button class="mode-btn" id="modeManualBtn" onclick="setMode('manual')">📋 Manual</button>
      </div>
    </div>
  </div>

  <!-- Manual mode panel (hidden by default) -->
  <div class="manual-panel" id="manualPanel" style="display:none">
    <div class="manual-filter-row">
      <label>Grade:</label>
      <select id="gradeFilter" class="ctrl-select" onchange="renderManualList()">
        <option value="all">All Students</option>
        <option value="teacher">Teachers</option>
      </select>
      <input type="search" id="manualSearch" class="ctrl-input" placeholder="Search by name…" oninput="renderManualList()">
    </div>
    <div class="manual-list" id="manualList">
      <div class="manual-hint">Loading students…</div>
    </div>
  </div>

  <div class="status-bar" id="statusBar">Initializing…</div>

  <div class="toast-stack" id="toastStack"></div>

  <div class="stats-row">
    <div class="stat"><div class="stat-num" id="stRegistered">0</div><div class="stat-label">Registered</div></div>
    <div class="stat"><div class="stat-num" id="stMarked">0</div><div class="stat-label">Marked</div></div>
    <div class="stat"><div class="stat-num" id="stFps">0</div><div class="stat-label">FPS</div></div>
  </div>

  <div class="loading-mask" id="loadMask">
    <div class="spinner"></div>
    <div class="loading-text" id="loadText">Loading face models…</div>
  </div>
</div>


<!-- ═══════════════ DEPENDENCIES ═══════════════ -->
<!-- Firebase (for checking teacher status) -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<!-- face-api utilities -->
<script src="face-utils.js"></script>


<script>
/* ═══════════════ CONFIG ═══════════════ */
const TEACHER_ACCESS_CODE = 'vipassi teachers@';
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw4qb-_hwj551JjEFcI_8eTDuWJErNaJRfgfA7__DlqYg6nwpS9uO9nDcQWkLtVsE0S/exec';

const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyAWpPP3OevjIRAsoGIjOJTofV6l2jgyhNI",
  authDomain:        "signin-f9656.firebaseapp.com",
  projectId:         "signin-f9656",
  storageBucket:     "signin-f9656.firebasestorage.app",
  messagingSenderId: "1074665165821",
  appId:             "1:1074665165821:web:91ef329a0472fa138e7f94"
};

if (!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
const auth = firebase.auth();
const db   = firebase.firestore();


/* ═══════════════ GATE LOGIC ═══════════════ */
async function checkGate() {
  const pass = document.getElementById('gatePass').value;
  const err  = document.getElementById('gateErr');
  const btn  = document.getElementById('gateBtn');
  err.textContent = '';

  if (pass !== TEACHER_ACCESS_CODE) {
    err.textContent = '⚠ Incorrect access code.';
    return;
  }

  btn.disabled = true; btn.textContent = 'Verifying teacher…';

  // Check we are a logged-in teacher (either Firebase auth OR face-login session)
  let isTeacher = false;
  let teacherName = '';

  // 1. Firebase auth
  const fbUser = await new Promise(res => {
    const unsub = auth.onAuthStateChanged(u => { unsub(); res(u); });
  });

  if (fbUser) {
    try {
      const snap = await db.collection('users').doc(fbUser.uid).get();
      if (snap.exists && snap.data().role === 'teacher') {
        isTeacher = true;
        teacherName = snap.data().displayName || fbUser.displayName || '';
      }
    } catch (e) { console.warn('Firestore lookup failed:', e); }
  }

  // 2. Face-login session (localStorage)
  if (!isTeacher) {
    const fl = localStorage.getItem('svFaceUser');
    if (fl) {
      try {
        const u = JSON.parse(fl);
        if (u.role === 'teacher' && (Date.now() - u.signedInAt) < 8 * 3600 * 1000) {
          isTeacher = true;
          teacherName = u.name || '';
        }
      } catch (e) {}
    }
  }

  if (!isTeacher) {
    err.innerHTML = '⚠ You must be signed in as a teacher.<br><a href="index.html#login" style="color:#c9a84c">Go sign in →</a>';
    btn.disabled = false; btn.textContent = 'Unlock Scanner';
    return;
  }

  // All good — open scanner
  document.getElementById('gate').style.display = 'none';
  document.getElementById('scanner').classList.add('on');
  initScanner(teacherName);
}

// Enter to submit
document.getElementById('gatePass').addEventListener('keydown', e => {
  if (e.key === 'Enter') checkGate();
});


/* ═══════════════ SCANNER ═══════════════ */
let knownFaces = []; // [{uid, name, role, grade, descriptor, photoURL}]
let scanRunning = false;
let lastDetection = 0;
let frameCount = 0;
let fpsTimer = 0;
const markedToday = new Set(); // UIDs marked in this session

/* ═══════════════ DATE + MODE ═══════════════ */
let currentMode = 'scan'; // 'scan' or 'manual'

// Returns the selected date as YYYY-MM-DD, or today if no selection
function getSelectedDate() {
  const sel = document.getElementById('dateSelect');
  if (!sel || !sel.value) {
    // Fallback to today (if today is a Sunday) or nearest past Sunday
    const today = new Date();
    const offset = today.getDay(); // 0 if Sunday
    const sun = new Date(today.getTime() - offset * 86400000);
    return sun.toISOString().substring(0, 10);
  }
  return sel.value;
}

// Populate the date selector with last 104 Sundays (2 years back) grouped by year
function populateDateSelector() {
  const sel = document.getElementById('dateSelect');
  if (!sel) return;
  sel.innerHTML = '';

  const today = new Date();
  const offset = today.getDay();
  const mostRecentSunday = new Date(today.getTime() - offset * 86400000);

  // Build all Sundays then group into <optgroup>s by year
  const sundaysByYear = {};
  for (let i = 0; i < 104; i++) {
    const d = new Date(mostRecentSunday.getTime() - i * 7 * 86400000);
    const year = d.getFullYear();
    if (!sundaysByYear[year]) sundaysByYear[year] = [];
    sundaysByYear[year].push({ date: d, weeksBack: i });
  }

  const monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const years = Object.keys(sundaysByYear).sort().reverse();
  const currentYear = today.getFullYear();

  years.forEach(year => {
    const og = document.createElement('optgroup');
    og.label = year + (parseInt(year) === currentYear ? ' (current year)' : ' (archived)');
    sundaysByYear[year].forEach(item => {
      const d = item.date;
      const iso = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
      let label = d.getDate() + ' ' + monthNames[d.getMonth()] + ' ' + d.getFullYear();
      if (item.weeksBack === 0 && offset === 0) label += ' (today)';
      else if (item.weeksBack === 0)             label += ' (this Sunday)';
      else if (item.weeksBack === 1 && offset === 0) label += ' (last Sunday)';
      const opt = document.createElement('option');
      opt.value = iso;
      opt.textContent = label;
      og.appendChild(opt);
    });
    sel.appendChild(og);
  });

  // Default to the most recent Sunday
  const firstOptGroup = sel.querySelector('optgroup');
  if (firstOptGroup && firstOptGroup.children.length) {
    sel.value = firstOptGroup.children[0].value;
  }
}

function onDateChange() {
  const date = getSelectedDate();
  const status = document.getElementById('statusBar');
  if (status) status.textContent = '📅 Date set to ' + date + ' — scans/marks will go to this Sunday';
  markedToday.clear();
  document.getElementById('stMarked').textContent = '0';
  // If we're in manual mode, re-render to show fresh state
  if (currentMode === 'manual') renderManualList();
}

function setMode(mode) {
  currentMode = mode;
  document.getElementById('modeScanBtn').classList.toggle('active', mode === 'scan');
  document.getElementById('modeManualBtn').classList.toggle('active', mode === 'manual');
  document.getElementById('scanModeWrap').style.display = mode === 'scan' ? 'block' : 'none';
  document.getElementById('manualPanel').style.display  = mode === 'manual' ? 'block' : 'none';

  if (mode === 'manual') {
    populateGradeFilter();
    renderManualList();
    // Stop scanning loop in manual mode
    scanRunning = false;
  } else {
    // Resume scanning
    if (knownFaces.length && !scanRunning) {
      scanRunning = true;
      scanLoop();
    }
  }
}

function populateGradeFilter() {
  const sel = document.getElementById('gradeFilter');
  if (!sel || sel.options.length > 2) return; // already populated
  // Find unique grades in knownFaces
  const grades = new Set();
  knownFaces.forEach(f => { if (f.role === 'student' && f.grade) grades.add(f.grade); });
  const sortedGrades = Array.from(grades).sort((a,b) => a - b);
  sortedGrades.forEach(g => {
    const opt = document.createElement('option');
    opt.value = 'g' + g;
    opt.textContent = 'Grade ' + g;
    sel.appendChild(opt);
  });
}

function renderManualList() {
  const listEl = document.getElementById('manualList');
  if (!listEl) return;
  const filterVal = document.getElementById('gradeFilter').value;
  const searchQ = (document.getElementById('manualSearch').value || '').trim().toLowerCase();

  let people = knownFaces.filter(f => {
    if (filterVal === 'teacher') return f.role === 'teacher';
    if (filterVal === 'all')     return f.role === 'student';
    if (filterVal.startsWith('g')) {
      const g = parseInt(filterVal.substring(1), 10);
      return f.role === 'student' && f.grade === g;
    }
    return true;
  });
  if (searchQ) {
    people = people.filter(p => (p.name || '').toLowerCase().indexOf(searchQ) !== -1);
  }
  people.sort((a, b) => (a.name || '').localeCompare(b.name || ''));

  if (people.length === 0) {
    listEl.innerHTML = '<div class="manual-hint">No students match this filter.</div>';
    return;
  }

  // Compose the rows
  const rows = people.map(p => {
    const initials = (p.name || '?').split(/\s+/).map(w => w.charAt(0)).slice(0, 2).join('').toUpperCase();
    const photoHtml = p.photoURL
      ? '<img src="' + thumbUrl(p.photoURL) + '" alt="">'
      : initials;
    const subtitle = p.role === 'teacher' ? 'Teacher' : 'Grade ' + (p.grade || '?');
    return '' +
      '<div class="manual-row" data-uid="' + p.uid + '">' +
        '<div class="manual-photo">' + photoHtml + '</div>' +
        '<div class="manual-info">' +
          '<div class="manual-name">' + escapeHtml(p.name || '—') + '</div>' +
          '<div class="manual-sub">' + subtitle + '</div>' +
        '</div>' +
        '<div class="manual-actions">' +
          '<button class="manual-mark-btn present" onclick="manualMark(\'' + p.uid + '\', \'present\')">✓ Present</button>' +
          '<button class="manual-mark-btn absent"  onclick="manualMark(\'' + p.uid + '\', \'absent\')">✗ Absent</button>' +
        '</div>' +
      '</div>';
  }).join('');
  listEl.innerHTML = rows;
}

function thumbUrl(url) {
  if (!url) return '';
  const m = url.match(/[?&]id=([^&]+)|\/d\/([^\/]+)/);
  const id = m ? (m[1] || m[2]) : '';
  return id ? ('https://drive.google.com/thumbnail?id=' + id + '&sz=w200') : url;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

async function manualMark(uid, status) {
  const person = knownFaces.find(p => p.uid === uid);
  if (!person) return;

  // Disable both buttons for this row while saving
  const row = document.querySelector('.manual-row[data-uid="' + uid + '"]');
  if (row) row.querySelectorAll('.manual-mark-btn').forEach(b => b.disabled = true);

  try {
    const res = await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({
        action: 'mark_attendance',
        uid:    person.uid,
        role:   person.role,
        grade:  person.grade,
        date:   getSelectedDate(),
        status: status
      })
    });
    const json = await res.json();

    if (json.notSunday) {
      showToast({ type: 'warn', name: person.name, sub: '📅 ' + (json.error || 'Selected date is not a Sunday'), photo: person.photoURL });
    } else if (json.skipped) {
      showToast({ type: 'warn', name: person.name, sub: '↻ ' + (json.reason || 'Already marked'), photo: person.photoURL });
    } else if (json.ok) {
      // Highlight the chosen button
      if (row) {
        row.querySelectorAll('.manual-mark-btn').forEach(b => b.classList.remove('active'));
        const btn = row.querySelector('.manual-mark-btn.' + status);
        if (btn) btn.classList.add('active');
      }
      markedToday.add(uid);
      document.getElementById('stMarked').textContent = markedToday.size;
      showToast({
        type: status === 'present' ? 'ok' : 'warn',
        name:  person.name,
        sub:   (status === 'present' ? '✓ Marked PRESENT for ' : '✗ Marked ABSENT for ') + (json.sundayLabel || getSelectedDate()),
        photo: person.photoURL
      });
    } else {
      throw new Error(json.error || 'Mark failed');
    }
  } catch (e) {
    showToast({ type: 'err', name: person.name, sub: 'Error: ' + e.message, photo: person.photoURL });
  } finally {
    if (row) row.querySelectorAll('.manual-mark-btn').forEach(b => b.disabled = false);
  }
}

async function initScanner(teacherName) {
  if (typeof SVFace === 'undefined') {
    document.getElementById('loadText').innerHTML =
      '<div style="color:#e07070; margin-bottom:12px;">⚠ face-utils.js failed to load.</div>' +
      'Make sure <code>face-utils.js</code> is in the same folder as scanner.html.' +
      '<br><br><button onclick="location.reload()" style="padding:10px 24px;background:#c9a84c;' +
      'color:#1a0800;border:none;border-radius:4px;font-weight:700;cursor:pointer;">↺ Retry</button>';
    return;
  }
  // ... rest of function unchanged
  const status = document.getElementById('statusBar');
  const mask = document.getElementById('loadMask');
  const loadText = document.getElementById('loadText');

  // Populate the Sunday-date selector immediately (doesn't depend on anything async)
  populateDateSelector();

  try {
    loadText.textContent = 'Loading face models (~7MB) — can take 10-30 seconds on first load…';
    // Pulse the message so the user knows it's still working
    let pulseDots = 0;
    const pulseTimer = setInterval(() => {
      pulseDots = (pulseDots + 1) % 4;
      loadText.textContent = 'Loading face models (~7MB) — first load can be slow' + '.'.repeat(pulseDots).padEnd(3, ' ');
    }, 500);
    try {
      await SVFace.loadModels();
    } finally {
      clearInterval(pulseTimer);
    }

    loadText.textContent = 'Starting camera…';
    const video = document.getElementById('camVideo');
    await SVFace.startCamera(video);

    // Set up overlay canvas size
    const overlay = document.getElementById('camOverlay');
    overlay.width  = video.videoWidth;
    overlay.height = video.videoHeight;

    loadText.textContent = 'Loading registered faces…';
    await loadFaces();

    mask.classList.add('hidden');
    status.textContent = 'Hello, ' + teacherName.split(/\s+/)[0] + ' · ' + knownFaces.length + ' faces loaded';

    scanRunning = true;
    requestAnimationFrame(scanLoop);
    fpsTimer = setInterval(updateFps, 1000);
  } catch (e) {
    loadText.innerHTML =
      '<div style="color:#e07070; margin-bottom:12px; font-size:0.9rem;">⚠ ' + e.message + '</div>' +
      '<button onclick="location.reload()" style="' +
        'padding:10px 24px; background:#c9a84c; color:#1a0800; border:none;' +
        'border-radius:4px; font-weight:700; font-size:11px; letter-spacing:1.5px;' +
        'cursor:pointer; text-transform:uppercase; display:block; margin:0 auto 12px;' +
      '">↺ Retry</button>' +
      '<div style="font-size:11px; color:rgba(245,222,179,0.35); line-height:1.7;">' +
        'If this keeps failing:<br>' +
        '1. Check the browser Console (F12) for the exact error<br>' +
        '2. Make sure the <code>models/</code> folder is uploaded to your server<br>' +
        '3. Make sure <code>face-api.min.js</code> is next to scanner.html' +
      '</div>';
  }
}

async function loadFaces() {
  // Pull all face descriptors from Firestore (single round-trip)
  const snap = await db.collection('users').where('hasFace', '==', true).get();
  knownFaces = [];
  snap.forEach(doc => {
    const d = doc.data();
    if (d.faceDescriptor && d.faceDescriptor.length === 128) {
      knownFaces.push({
        uid:   d.uid,
        name:  d.displayName || '(no name)',
        role:  d.role || '',
        grade: d.grade || d.teachingGrade || null,
        photoURL: d.photoURL || '',
        descriptor: d.faceDescriptor
      });
    }
  });
  document.getElementById('stRegistered').textContent = knownFaces.length;
}

async function reloadFaces() {
  document.getElementById('statusBar').textContent = 'Reloading…';
  await loadFaces();
  document.getElementById('statusBar').textContent = '✓ ' + knownFaces.length + ' faces loaded';
}

async function scanLoop() {
  if (!scanRunning) return;
  frameCount++;

  // Only scan every ~600ms to keep CPU sane
  const now = Date.now();
  if (now - lastDetection > 600) {
    lastDetection = now;
    await processFrame();
  }

  requestAnimationFrame(scanLoop);
}

function updateFps() {
  document.getElementById('stFps').textContent = frameCount;
  frameCount = 0;
}

async function processFrame() {
  const video = document.getElementById('camVideo');
  const overlay = document.getElementById('camOverlay');
  const ctx = overlay.getContext('2d');
  ctx.clearRect(0, 0, overlay.width, overlay.height);

  let detections;
  try {
    detections = await SVFace.computeAllDescriptors(video);
  } catch (e) { return; }

  if (!detections || detections.length === 0) return;

  for (const det of detections) {
    const box = det.detection.box;
    const match = SVFace.matchFace(det.descriptor, knownFaces);

    // Draw box
    const isMatch = !!match.match;
    ctx.strokeStyle = isMatch ? 'rgba(120,200,80,0.95)' : 'rgba(220,170,80,0.7)';
    ctx.lineWidth = 3;
    ctx.strokeRect(box.x, box.y, box.width, box.height);

    // Label
    const label = isMatch
      ? match.match.name + ' (' + match.distance.toFixed(2) + ')'
      : 'Unknown';
    ctx.fillStyle = isMatch ? 'rgba(40,80,20,0.85)' : 'rgba(80,50,10,0.85)';
    const labelY = box.y > 26 ? box.y - 4 : box.y + box.height + 22;
    ctx.fillRect(box.x, labelY - 22, ctx.measureText(label).width + 18, 26);
    ctx.fillStyle = '#fff';
    ctx.font = '15px Lato, sans-serif';
    ctx.fillText(label, box.x + 9, labelY - 5);

    if (isMatch) {
      handleMatch(match.match);
    }
  }
}

async function handleMatch(person) {
  if (markedToday.has(person.uid)) return; // Already marked in this session
  markedToday.add(person.uid); // Optimistic — back-end de-dupes 30-min window anyway
  document.getElementById('stMarked').textContent = markedToday.size;

  showToast({
    type: 'ok',
    name:  person.name,
    sub:   (person.role === 'teacher' ? 'Teacher' : 'Grade ' + (person.grade || '?')) + ' · marking attendance…',
    photo: person.photoURL
  });

  try {
    const res = await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({
        action: 'mark_attendance',
        uid:    person.uid,
        role:   person.role,
        grade:  person.grade,
        date:   getSelectedDate(),    // selected Sunday (YYYY-MM-DD)
        status: 'present'
      })
    });
    const json = await res.json();
    if (json.notSunday) {
      // Today isn't Sunday — school is Sunday-only, so we can't mark attendance.
      showToast({
        type: 'warn',
        name:  person.name,
        sub:   '📅 ' + (json.error || 'Today is not Sunday — attendance not recorded'),
        photo: person.photoURL
      });
      markedToday.delete(person.uid); // Allow re-scan on Sunday
    } else if (json.skipped) {
      showToast({
        type: 'warn',
        name:  person.name,
        sub:   '✓ ' + (json.reason || 'Already marked today'),
        photo: person.photoURL
      });
    } else if (json.ok) {
      showToast({
        type: 'ok',
        name:  person.name,
        sub:   '✓ Marked present for ' + (json.sundayLabel || 'today'),
        photo: person.photoURL
      });
    } else {
      throw new Error(json.error || 'Unknown error');
    }
  } catch (e) {
    showToast({
      type: 'err',
      name:  person.name,
      sub:   '⚠ ' + e.message,
      photo: person.photoURL
    });
    markedToday.delete(person.uid); // Allow retry
  }
}

function showToast({ type, name, sub, photo }) {
  const stack = document.getElementById('toastStack');
  const el = document.createElement('div');
  el.className = 'toast' + (type === 'warn' ? ' warn' : type === 'err' ? ' err' : '');
  el.innerHTML = `
    <div class="toast-avatar">${photo ? `<img src="${photo}" alt="">` : (name||'?')[0].toUpperCase()}</div>
    <div class="toast-text">
      <div class="nm">${name}</div>
      <div class="sub">${sub}</div>
    </div>
  `;
  stack.appendChild(el);
  // Keep at most 4 toasts
  while (stack.children.length > 4) stack.removeChild(stack.firstChild);
  setTimeout(() => { el.style.opacity = '0'; el.style.transition = 'opacity .4s'; }, 5400);
  setTimeout(() => { if (el.parentNode) el.parentNode.removeChild(el); }, 5900);
}

function exitScanner() {
  scanRunning = false;
  clearInterval(fpsTimer);
  SVFace.stopCamera(document.getElementById('camVideo'));
  window.location.href = 'index.html';
}
</script>

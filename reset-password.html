<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password | Sri Vipassi Dhamma School</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    body { margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center; background:#0d0604; color:#f5e6c8; font-family:'Lato',sans-serif; }
    .card { width:min(420px,calc(100vw-32px)); padding:28px; background:rgba(15,8,4,0.95); border:1px solid rgba(201,168,76,0.3); border-radius:18px; box-shadow:0 24px 64px rgba(0,0,0,0.55); }
    h1 { margin:0 0 14px; font-size:1.5rem; letter-spacing:0.08em; text-transform:uppercase; color:#e8d5a0; }
    p { margin:0 0 20px; line-height:1.6; color:rgba(245,230,200,0.84); }
    .field { margin-bottom:14px; }
    label { display:block; margin-bottom:6px; font-size:0.88rem; color:#d4af37; letter-spacing:0.04em; }
    input { width:100%; padding:12px 14px; border-radius:10px; border:1px solid rgba(212,175,55,0.25); background:rgba(255,255,255,0.05); color:#f7ead2; font-size:0.95rem; }
    button { width:100%; padding:12px 14px; border:none; border-radius:10px; background:linear-gradient(135deg,#d4af37,#b8941f); color:#1a0606; font-weight:700; letter-spacing:0.08em; cursor:pointer; text-transform:uppercase; }
    .note { margin:12px 0 0; font-size:0.92rem; color:rgba(245,222,179,0.7); }
    .error { margin-top:12px; color:#f07e7e; min-height:20px; }
    .success { margin-top:12px; color:#82c683; min-height:20px; }
    a { color:#d4af37; text-decoration:none; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Reset Password</h1>
    <p>Enter your new password below to finish resetting your account.</p>
    <div class="field"><label for="newPassword">New Password</label><input id="newPassword" type="password" autocomplete="new-password" placeholder="New password (min 6 chars)"></div>
    <div class="field"><label for="confirmPassword">Confirm Password</label><input id="confirmPassword" type="password" autocomplete="new-password" placeholder="Confirm new password"></div>
    <button id="resetBtn" type="button">Update Password</button>
    <button id="continueBtn" type="button" style="display:none; margin-top:14px;">Continue to Sign In</button>
    <div id="resetMsg" class="error"></div>
    <div id="linkInfo" class="note"></div>
    <p class="note">If you did not request this, please ignore this email or sign in with your existing password.</p>
    <p class="note"><a href="index.html?openAuth=si">Return to sign in</a></p>
  </div>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script>
    if (!firebase.apps.length) {
      firebase.initializeApp({
        apiKey:            "AIzaSyAWpPP3OevjIRAsoGIjOJTofV6l2jgyhNI",
        authDomain:        "signin-f9656.firebaseapp.com",
        projectId:         "signin-f9656",
        storageBucket:     "signin-f9656.firebasestorage.app",
        messagingSenderId: "1074665165821",
        appId:             "1:1074665165821:web:91ef329a0472fa138e7f94"
      });
    }
    const auth = firebase.auth();

    function showMessage(text, isError) {
      const el = document.getElementById('resetMsg');
      el.textContent = text;
      el.className = isError ? 'error' : 'success';
    }

    function getResetCode() {
      const params = new URLSearchParams(window.location.search);
      let oobCode = params.get('oobCode');
      if (!oobCode && window.location.hash) {
        const hash = window.location.hash.substring(1);
        const hashParams = new URLSearchParams(hash);
        oobCode = hashParams.get('oobCode');
      }
      return oobCode;
    }

    async function applyActionCode(oobCode) {
      try {
        const info = await auth.checkActionCode(oobCode);
        if (!info || !info.data) {
          showMessage('Invalid or expired reset link.', true);
          return;
        }
        return info;
      } catch (e) {
        showMessage('Invalid or expired reset link.', true);
      }
    }

    async function handleReset() {
      const newPassword = document.getElementById('newPassword').value.trim();
      const confirmPassword = document.getElementById('confirmPassword').value.trim();
      if (!newPassword || !confirmPassword) return showMessage('Please fill in both fields.', true);
      if (newPassword.length < 6) return showMessage('Password must be at least 6 characters.', true);
      if (newPassword !== confirmPassword) return showMessage('Passwords do not match.', true);
      const oobCode = getResetCode();
      if (!oobCode) return showMessage('Missing reset code in the link.', true);

      try {
        await auth.confirmPasswordReset(oobCode, newPassword);
        showMessage('Password updated successfully. Redirecting to sign in...', false);
        document.getElementById('resetBtn').disabled = true;
        if (resetEmail) {
          try {
            await auth.signInWithEmailAndPassword(resetEmail, newPassword);
          } catch (signInError) {
            console.warn('Auto sign-in failed:', signInError);
          }
        }
        const continueBtn = document.getElementById('continueBtn');
        if (continueBtn) {
          continueBtn.style.display = 'block';
          continueBtn.onclick = function() {
            window.location.href = 'index.html?openAuth=si';
          };
        }
        setTimeout(function() {
          window.location.replace('index.html?openAuth=si');
        }, 1400);
      } catch (e) {
        const msg = e.code === 'auth/expired-action-code' ? 'Reset link expired. Request a new one.' :
                    e.code === 'auth/invalid-action-code' ? 'Reset link is invalid.' :
                    'Could not reset password. Please try again.';
        showMessage(msg, true);
      }
    }

    const resetBtn = document.getElementById('resetBtn');
    const linkInfo = document.getElementById('linkInfo');
    let resetEmail = null;
    resetBtn.addEventListener('click', handleReset);
    window.addEventListener('load', async function() {
      resetBtn.disabled = true;
      const oobCode = getResetCode();
      if (!oobCode) {
        showMessage('This page must be opened from the password reset email link. If you do not have it, use Forgot password? on the login page again.', true);
        return;
      }
      try {
        const info = await auth.checkActionCode(oobCode);
        resetEmail = info.data && info.data.email ? info.data.email : null;
        linkInfo.textContent = 'Reset link is valid for: ' + (resetEmail || 'your account');
        resetBtn.disabled = false;
        showMessage('Reset link verified. Enter your new password and click Update Password.', false);
      } catch (e) {
        showMessage('Reset link is invalid or expired. Request a new link from the login page.', true);
        resetBtn.disabled = true;
      }
    });
  </script>
</body>
</html>
